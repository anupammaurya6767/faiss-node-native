name: CodeRabbit Integration

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  coderabbit-info:
    runs-on: ubuntu-latest
    name: CodeRabbit Information
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Display CodeRabbit Information
        run: |
          echo "CodeRabbit AI Integration is active!"
          echo "Check PR comments for AI-powered code review."
