name: Deploy Documentation to GitHub Pages

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
    paths:
      - 'src/**'
      - 'Doxyfile'
      - 'typedoc.json'
      - 'README.md'
      - 'API.md'
  workflow_dispatch:

# Permissions for GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build All Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --ignore-scripts
      
      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz
      
      - name: Generate all documentation
        run: |
          echo "=== Generating TypeDoc (JavaScript API) ==="
          npm run docs:js
          echo "=== Generating Doxygen (C++ Native) ==="
          npm run docs:cpp
          echo "=== Documentation generation complete ==="
          ls -la docs/api/ | head -5
          ls -la docs/html/ | head -5
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Remove CNAME files
        run: |
          find ./docs -name "CNAME" -exec rm -f {} + || true
          echo "✅ CNAME files removed"
      
      - name: Prepare Pages content
        run: |
          rm -rf site
          mkdir -p site/api site/native
          cp -r docs/api/. site/api/
          cp -r docs/html/. site/native/
          touch site/.nojekyll
          cat > site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8" />
            <title>@faiss-node/native Documentation</title>
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <style>
              body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                max-width: 780px;
                margin: 3rem auto;
                padding: 0 1.25rem;
                line-height: 1.6;
                color: #1f2937;
              }
              h1 { margin-bottom: 0.5rem; }
              p { color: #4b5563; }
              ul { padding-left: 1.25rem; }
              code {
                background: #f3f4f6;
                padding: 0.15rem 0.35rem;
                border-radius: 0.25rem;
              }
            </style>
          </head>
          <body>
            <h1>@faiss-node/native Documentation</h1>
            <p>High-performance Node.js bindings for FAISS with float and binary indexes, CLI tooling, metrics helpers, and optional GPU migration hooks.</p>
            <ul>
              <li><a href="./api/index.html">JavaScript / TypeScript API (TypeDoc)</a></li>
              <li><a href="./native/index.html">C++ Native Code (Doxygen)</a></li>
            </ul>
            <p>The landing page is generated by <code>.github/workflows/docs.yml</code>.</p>
          </body>
          </html>
          EOF
          echo "✅ Pages content prepared under site/"
      
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site'

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
