name: Nightly

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  nightly-build-and-test:
    name: Nightly build, test, and example smoke
    runs-on: ubuntu-latest
    env:
      FAISS_REF: v1.14.1
      OMP_NUM_THREADS: 1
      OMP_THREAD_LIMIT: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libopenblas-dev libomp-dev build-essential

      - name: Build and install FAISS (CPU)
        run: |
          git clone --branch "$FAISS_REF" --depth 1 https://github.com/facebookresearch/faiss.git /tmp/faiss
          cd /tmp/faiss
          cmake -B build \
            -DFAISS_ENABLE_GPU=OFF \
            -DFAISS_ENABLE_PYTHON=OFF \
            -DBUILD_TESTING=OFF \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DCMAKE_CXX_FLAGS="-fopenmp" \
            -DCMAKE_C_FLAGS="-fopenmp"
          cmake --build build -j"$(nproc)"
          sudo cmake --install build
          sudo ldconfig

      - name: Install npm dependencies
        run: npm ci

      - name: Build native module
        run: |
          export CPPFLAGS="-I/usr/local/include"
          export CXXFLAGS="-I/usr/local/include"
          export LDFLAGS="-L/usr/local/lib"
          npm run build

      - name: Run focused nightly tests
        run: |
          npm test -- --runTestsByPath \
            test/unit/index.test.js \
            test/unit/ivf-hnsw.test.js \
            test/unit/additional-index-types.test.js \
            test/unit/operations-and-metrics.test.js \
            test/unit/utilities.test.js \
            test/unit/binary-indexes.test.js \
            test/unit/cli.test.js

      - name: Smoke example scripts
        run: |
          node examples/basic-search.js
          node examples/binary-search.js
