name: Manual Documentation Deploy

# Alternative workflow using peaceiris/actions-gh-pages
# Use this if you prefer the older method or need more control

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Commit message'
        required: false
        default: 'Update documentation'

permissions:
  contents: write

jobs:
  docs:
    name: Generate and Deploy Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for git operations
      
      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci --ignore-scripts
      
      - name: Generate documentation
        run: npm run docs

      - name: Prepare combined site
        run: |
          rm -rf site
          mkdir -p site/api site/native
          cp -r docs/api/. site/api/
          cp -r docs/html/. site/native/
          touch site/.nojekyll
          cat > site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8" />
            <title>@faiss-node/native Documentation</title>
            <meta name="viewport" content="width=device-width, initial-scale=1" />
          </head>
          <body>
            <h1>@faiss-node/native Documentation</h1>
            <ul>
              <li><a href="./api/index.html">JavaScript / TypeScript API (TypeDoc)</a></li>
              <li><a href="./native/index.html">C++ Native Code (Doxygen)</a></li>
            </ul>
          </body>
          </html>
          EOF
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: ${{ inputs.message }}
